<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cargar Loto Plus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a2e;
      color: #fff;
      min-height: 100dvh;
      padding: 20px;
      padding-bottom: 60px;
    }
    h1 {
      text-align: center;
      font-size: 1.4rem;
      margin-bottom: 20px;
      color: #ffe600;
    }
    h2.seccion {
      font-size: 1.1rem;
      color: #ffe600;
      margin: 24px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .card h3 {
      font-size: 1rem;
      margin-bottom: 12px;
      color: #ffe600;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: #ccc;
      margin: 10px 0 4px;
    }
    input[type="text"], input[type="date"], textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
    }
    textarea { resize: vertical; }
    .conteo {
      font-size: 0.75rem;
      margin-top: 4px;
      color: #999;
    }
    .conteo.ok { color: #4cff4c; }
    .conteo.bad { color: #ff8c4c; }
    input[type="file"] {
      width: 100%;
      padding: 10px 0;
      color: #ccc;
      font-size: 0.85rem;
    }
    .premio-row {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(0, 0.8fr) minmax(0, 1fr);
      gap: 6px;
      margin-bottom: 6px;
    }
    .premio-row input {
      padding: 8px;
      font-size: 0.85rem;
    }
    .btn-secundario {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      background: #1a3a8a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
    }
    #btn-parsear-pdf {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: #1a3a8a;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }
    #btn-parsear-pdf:disabled { opacity: 0.4; }
    #btn-guardar {
      display: block;
      width: 100%;
      padding: 18px;
      background: #ffe600;
      color: #000;
      border: none;
      border-radius: 16px;
      font-size: 1.3rem;
      font-weight: 900;
      cursor: pointer;
      margin-top: 16px;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-guardar:disabled { opacity: 0.35; }
    .estado {
      text-align: center;
      margin-top: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      min-height: 1.4em;
      white-space: pre-line;
    }
    .ok { color: #4cff4c; }
    .err { color: #ff4c4c; }
    .cargando { color: #ffe600; }
    .fila-doble {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
  </style>
</head>
<body>
  <h1>CARGAR RESULTADOS LOTO PLUS</h1>

  <h2 class="seccion">DATOS DEL SORTEO</h2>
  <div class="card">
    <label>Fecha del sorteo</label>
    <input type="date" id="fecha">
    <label>Número de sorteo</label>
    <input type="text" id="sorteo" placeholder="3898" inputmode="numeric">
  </div>

  <h2 class="seccion">CARGAR DESDE PDF (opcional)</h2>
  <div class="card">
    <input type="file" id="archivoPdf" accept="application/pdf">
    <button id="btn-parsear-pdf" disabled>LEER PDF Y COMPLETAR FORMULARIO</button>
    <div class="estado" id="estadoPdf"></div>
  </div>

  <h2 class="seccion">NÚMERO PLUS Y PRÓXIMO SORTEO</h2>
  <div class="card">
    <label>Número Plus del día</label>
    <input type="text" id="numeroPlus" placeholder="9" inputmode="numeric">
    <div class="fila-doble">
      <div>
        <label>Fecha próximo sorteo</label>
        <input type="date" id="proximoFecha">
      </div>
      <div>
        <label>Pozo estimado próximo sorteo</label>
        <input type="text" id="proximoPozo" placeholder="12.731.000.000" inputmode="decimal">
      </div>
    </div>
  </div>

  <h2 class="seccion">PRÓXIMO SORTEO MANUAL (feriados)</h2>
  <div class="card">
    <label>Usar esta fecha en vez de calcularla sola (próximo miércoles o sábado). Se usa solo mientras sea posterior a la fecha del último sorteo cargado; después el tablero vuelve a calcularla automáticamente.</label>
    <input type="date" id="proximoSorteoManual">
    <button type="button" class="btn-secundario" id="btn-guardar-proximo">GUARDAR FECHA MANUAL</button>
    <button type="button" class="btn-secundario" id="btn-borrar-proximo">VOLVER A AUTOMÁTICO</button>
    <div class="estado" id="estadoProximo"></div>
  </div>

  <h2 class="seccion">JUEGOS</h2>
  <div id="juegos"></div>

  <button id="btn-guardar">GUARDAR EN EL TABLERO</button>
  <div class="estado" id="estadoGuardar"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const SUPABASE_URL = "https://ldjwkwfkiqqfypftdeqa.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_birytOVhIQ0AoBY6f0yT-g_HpV01OhE";

    const SUBJUEGOS_CONFIG = {
      TRADICIONAL: { nombre: "TRADICIONAL", niveles: ["6 ACIERTOS", "5 ACIERTOS", "4 ACIERTOS"] },
      MATCH: { nombre: "MATCH", niveles: ["6 ACIERTOS", "5 ACIERTOS", "4 ACIERTOS"] },
      DESQUITE: { nombre: "DESQUITE", niveles: ["6 ACIERTOS"] },
      SALE_O_SALE: { nombre: "SALE O SALE", niveles: ["4 ACIERTOS"] }
    };

    const contenedorJuegos = document.getElementById("juegos");

    function crearFilaPremio(subjuego, nivel = "", ganadores = "", importe = "") {
      const fila = document.createElement("div");
      fila.className = "premio-row";
      fila.innerHTML = `
        <input type="text" class="premio-nivel" placeholder="Nivel (ej: 6 ACIERTOS)" value="${nivel}">
        <input type="text" class="premio-ganadores" placeholder="Ganadores" value="${ganadores}">
        <input type="text" class="premio-importe" placeholder="Importe" value="${importe}">
      `;
      document.getElementById(`premios_${subjuego}`).appendChild(fila);
    }

    Object.entries(SUBJUEGOS_CONFIG).forEach(([subjuego, cfg]) => {
      const card = document.createElement("div");
      card.className = "card juego-card";
      card.innerHTML = `
        <h3>${cfg.nombre}</h3>
        <label>6 números (separados por espacio o guion)</label>
        <textarea id="numeros_${subjuego}" rows="2" placeholder="05 09 22 27 38 42"></textarea>
        <div class="conteo" id="conteo_${subjuego}">0 números cargados</div>
        <label>Pozo aprox</label>
        <input type="text" id="pozo_${subjuego}" placeholder="2.688.086.611,26" inputmode="decimal">
        <label>Ganadores</label>
        <div id="premios_${subjuego}"></div>
      `;
      contenedorJuegos.appendChild(card);

      cfg.niveles.forEach(nivel => crearFilaPremio(subjuego, nivel));

      const textarea = document.getElementById(`numeros_${subjuego}`);
      const conteo = document.getElementById(`conteo_${subjuego}`);
      textarea.addEventListener("input", () => {
        const n = leerNumeros(textarea.value).length;
        conteo.textContent = `${n} número${n === 1 ? "" : "s"} cargado${n === 1 ? "" : "s"}`;
        conteo.className = "conteo " + (n === 6 ? "ok" : "bad");
      });
    });

    function leerNumeros(valor) {
      return valor
        .split(/[\s,;-]+/)
        .map(s => s.trim())
        .filter(Boolean)
        .map(s => s.padStart(2, "0"))
        .filter(s => /^\d{2}$/.test(s))
        .sort((a, b) => Number(a) - Number(b));
    }

    function parsePesosAR(str) {
      if (!str) return 0;
      const limpio = String(str).replace(/[^\d,.\-]/g, "").replace(/\./g, "").replace(",", ".");
      const n = parseFloat(limpio);
      return Number.isFinite(n) ? n : 0;
    }

    function formatoNumeroAR(n) {
      return Number(n).toLocaleString("es-AR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // --- Parseo de PDF (Lotería de la Ciudad · Loto Plus) ---

    const MESES = {
      ENERO: "01", FEBRERO: "02", MARZO: "03", ABRIL: "04", MAYO: "05", JUNIO: "06",
      JULIO: "07", AGOSTO: "08", SEPTIEMBRE: "09", SETIEMBRE: "09", OCTUBRE: "10",
      NOVIEMBRE: "11", DICIEMBRE: "12"
    };

    function fechaDesdeTexto(dia, mesTexto, anio) {
      const mes = MESES[mesTexto.toUpperCase()];
      if (!mes) return "";
      return `${anio}-${mes}-${String(dia).padStart(2, "0")}`;
    }

    async function extraerDatosPDF(file) {
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      const page = await pdf.getPage(1);
      const content = await page.getTextContent();
      const items = content.items
        .filter(it => it.str && it.str.trim() !== "")
        .map(it => ({ str: it.str.trim(), x: it.transform[4], y: it.transform[5] }));

      const resultado = { fecha: "", sorteo: "", numeroPlus: "", proximoFecha: "", proximoPozo: 0, subjuegos: {} };

      items.forEach(it => {
        const mSorteo = it.str.match(/SORTEO N[°º]\s*(\d+)/i);
        if (mSorteo) resultado.sorteo = mSorteo[1];

        const mFecha = it.str.match(/FECHA:\s*(\d{1,2})\s+DE\s+(\w+)\s+DE\s+(\d{4})/i);
        if (mFecha) resultado.fecha = fechaDesdeTexto(mFecha[1], mFecha[2], mFecha[3]);

        const mProximo = it.str.match(/XIMO SORTEO\s+(\d{1,2})\s+DE\s+(\w+)\s+DE\s+(\d{4})/i);
        if (mProximo) resultado.proximoFecha = fechaDesdeTexto(mProximo[1], mProximo[2], mProximo[3]);

        const mPlus = it.str.match(/^(\d{1,2})\s*:\s*(SIN GANADORES|\d+\s*GANADOR)/i);
        if (mPlus) resultado.numeroPlus = mPlus[1];

        if (/^\$\s*[\d.,]+$/.test(it.str) && it.x < 300) {
          resultado.proximoPozo = parsePesosAR(it.str);
        }
      });

      // Grupos de 6 números (columna izquierda de cada tabla)
      const gruposNumeros = [];
      const TOL_Y = 3;
      items.forEach(it => {
        if (it.x >= 300) return;
        if (!/^\d{2}(\s+\d{2}){0,5}$/.test(it.str)) return;
        let grupo = gruposNumeros.find(g => Math.abs(g.y - it.y) <= TOL_Y);
        if (!grupo) { grupo = { y: it.y, items: [] }; gruposNumeros.push(grupo); }
        grupo.items.push(it);
      });
      gruposNumeros.sort((a, b) => b.y - a.y);
      const numerosPorSubjuego = gruposNumeros.map(g => {
        g.items.sort((a, b) => a.x - b.x);
        return g.items.map(i => i.str).join(" ").split(/\s+/).filter(Boolean);
      });

      const ORDEN = ["TRADICIONAL", "MATCH", "DESQUITE", "SALE_O_SALE"];
      ORDEN.forEach((subjuego, i) => {
        resultado.subjuegos[subjuego] = { numeros: numerosPorSubjuego[i] || [], pozo: 0, premios: [] };
      });

      // Tablas de premios de TRADICIONAL y MATCH (3 filas: 6/5/4 aciertos)
      const bandas = [
        { subjuego: "TRADICIONAL", yMin: 660, yMax: 760 },
        { subjuego: "MATCH", yMin: 555, yMax: 655 }
      ];

      bandas.forEach(banda => {
        const enBanda = items.filter(it => it.y >= banda.yMin && it.y <= banda.yMax && it.x > 450);
        const filas = [];
        enBanda.forEach(it => {
          if (/^(ACIERTOS|POZO|APUESTAS|GANADORAS|PREMIO|POR APUESTA)$/i.test(it.str)) return;
          let fila = filas.find(f => Math.abs(f.y - it.y) <= TOL_Y);
          if (!fila) { fila = { y: it.y, items: [] }; filas.push(fila); }
          fila.items.push(it);
        });
        filas.sort((a, b) => b.y - a.y);
        const niveles = ["6 ACIERTOS", "5 ACIERTOS", "4 ACIERTOS"];
        const premios = filas.map((f, i) => {
          const pozoItem = f.items.find(it => it.x < 545);
          const ganadoresItem = f.items.find(it => it.x >= 545 && it.x < 660);
          const premioItem = f.items.find(it => it.x >= 660);
          return {
            nivel: niveles[i] || `NIVEL ${i + 1}`,
            ganadores: ganadoresItem ? ganadoresItem.str : "",
            importe: premioItem ? premioItem.str : ""
          };
        });
        resultado.subjuegos[banda.subjuego].premios = premios;
        const filaVacante = filas.find(f => f.items.some(it => /vacante/i.test(it.str)));
        if (filaVacante) {
          const pozoItem = filaVacante.items.find(it => it.x < 545);
          if (pozoItem) resultado.subjuegos[banda.subjuego].pozo = parsePesosAR(pozoItem.str);
        }
      });

      // Desquite (una sola fila)
      const bandaDesquite = items.filter(it => it.y >= 460 && it.y <= 520);
      const pozoDesquite = bandaDesquite.find(it => /^\$/.test(it.str));
      const vacanteDesquite = bandaDesquite.find(it => /vacante/i.test(it.str));
      resultado.subjuegos.DESQUITE.pozo = pozoDesquite ? parsePesosAR(pozoDesquite.str) : 0;
      resultado.subjuegos.DESQUITE.premios = [{
        nivel: "6 ACIERTOS",
        ganadores: vacanteDesquite ? "VACANTE" : "",
        importe: pozoDesquite ? pozoDesquite.str : ""
      }];

      // Sale o sale (texto combinado "N GANADORES COBRAN $ monto c/u")
      const bandaSaleOSale = items.filter(it => it.y >= 375 && it.y <= 410);
      const combinado = bandaSaleOSale.map(it => it.str).find(s => /GANADOR/i.test(s));
      resultado.subjuegos.SALE_O_SALE.premios = [];
      if (combinado) {
        const m = combinado.match(/(\d+)\s*GANADOR(?:ES)?\s*COBRAN\s*\$?\s*([\d.,]+)/i);
        if (m) {
          resultado.subjuegos.SALE_O_SALE.premios = [{
            nivel: "4 ACIERTOS",
            ganadores: m[1],
            importe: `$ ${m[2]}`
          }];
        }
      }

      return resultado;
    }

    function rellenarFormulario(datos) {
      if (datos.fecha) document.getElementById("fecha").value = datos.fecha;
      if (datos.sorteo) document.getElementById("sorteo").value = datos.sorteo;
      if (datos.numeroPlus) document.getElementById("numeroPlus").value = datos.numeroPlus;
      if (datos.proximoFecha) document.getElementById("proximoFecha").value = datos.proximoFecha;
      if (datos.proximoPozo) document.getElementById("proximoPozo").value = formatoNumeroAR(datos.proximoPozo);

      Object.keys(SUBJUEGOS_CONFIG).forEach(subjuego => {
        const d = datos.subjuegos[subjuego];
        if (!d) return;

        if (d.numeros.length > 0) {
          document.getElementById(`numeros_${subjuego}`).value = d.numeros.join(" - ");
          document.getElementById(`numeros_${subjuego}`).dispatchEvent(new Event("input"));
        }
        if (d.pozo) {
          document.getElementById(`pozo_${subjuego}`).value = formatoNumeroAR(d.pozo);
        }
        if (d.premios.length > 0) {
          const contenedor = document.getElementById(`premios_${subjuego}`);
          contenedor.innerHTML = "";
          d.premios.forEach(p => crearFilaPremio(subjuego, p.nivel, p.ganadores, p.importe));
        }
      });
    }

    const inputPdf = document.getElementById("archivoPdf");
    const btnParsear = document.getElementById("btn-parsear-pdf");
    const estadoPdf = document.getElementById("estadoPdf");

    inputPdf.addEventListener("change", () => {
      btnParsear.disabled = !inputPdf.files[0];
    });

    btnParsear.addEventListener("click", async () => {
      const file = inputPdf.files[0];
      if (!file) return;

      btnParsear.disabled = true;
      estadoPdf.className = "estado cargando";
      estadoPdf.textContent = "Leyendo PDF...";

      try {
        const datos = await extraerDatosPDF(file);
        rellenarFormulario(datos);

        const faltantes = Object.keys(SUBJUEGOS_CONFIG).filter(j => (datos.subjuegos[j]?.numeros.length || 0) !== 6);
        if (faltantes.length > 0) {
          estadoPdf.className = "estado err";
          estadoPdf.textContent = `Revisá los números de: ${faltantes.join(", ")} (no se detectaron los 6). El resto del formulario se completó, corregí a mano lo que falte antes de guardar.`;
        } else {
          estadoPdf.className = "estado ok";
          estadoPdf.textContent = "PDF leído. Revisá los datos abajo antes de guardar.";
        }
      } catch (error) {
        estadoPdf.className = "estado err";
        estadoPdf.textContent = "No se pudo leer el PDF: " + error.message + ". Cargá los datos a mano.";
      } finally {
        btnParsear.disabled = false;
      }
    });

    // --- Guardado ---

    const btnGuardar = document.getElementById("btn-guardar");
    const estadoGuardar = document.getElementById("estadoGuardar");

    btnGuardar.addEventListener("click", async () => {
      const fecha = document.getElementById("fecha").value;
      const sorteo = document.getElementById("sorteo").value.trim();
      const numeroPlus = document.getElementById("numeroPlus").value.trim();
      const proximoFecha = document.getElementById("proximoFecha").value;
      const proximoPozo = parsePesosAR(document.getElementById("proximoPozo").value);
      const errores = [];

      if (!fecha) errores.push("Falta la fecha del sorteo.");

      const filas = [];

      Object.entries(SUBJUEGOS_CONFIG).forEach(([subjuego, cfg]) => {
        const numeros = leerNumeros(document.getElementById(`numeros_${subjuego}`).value);
        if (numeros.length !== 6) {
          errores.push(`${cfg.nombre}: se esperaban 6 números, hay ${numeros.length}.`);
        }

        const pozo = parsePesosAR(document.getElementById(`pozo_${subjuego}`).value);

        const premios = [...document.querySelectorAll(`#premios_${subjuego} .premio-row`)]
          .map(fila => ({
            nivel: fila.querySelector(".premio-nivel").value.trim(),
            ganadores: fila.querySelector(".premio-ganadores").value.trim(),
            importe: fila.querySelector(".premio-importe").value.trim()
          }))
          .filter(p => p.nivel !== "");

        if (premios.length === 0) {
          errores.push(`${cfg.nombre}: cargá al menos un nivel de ganadores.`);
        }

        const extra = subjuego === "TRADICIONAL" ? { numeroPlus, proximoFecha, proximoPozo } : null;

        filas.push({
          loteria: "LOTOPLUS",
          subjuego,
          fecha,
          sorteo,
          numeros: numeros.join("-"),
          pozo,
          premios_detalle: premios,
          extra
        });
      });

      if (errores.length > 0) {
        estadoGuardar.className = "estado err";
        estadoGuardar.textContent = errores.join("\n");
        return;
      }

      btnGuardar.disabled = true;
      estadoGuardar.className = "estado cargando";
      estadoGuardar.textContent = "Guardando...";

      try {
        const baseUrl = SUPABASE_URL.replace(/\/$/, "");
        const res = await fetch(`${baseUrl}/rest/v1/resultados_loterias?on_conflict=loteria,subjuego,fecha`, {
          method: "POST",
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "resolution=merge-duplicates,return=minimal"
          },
          body: JSON.stringify(filas)
        });

        if (!res.ok) {
          const txt = await res.text();
          throw new Error(txt);
        }

        estadoGuardar.className = "estado ok";
        estadoGuardar.textContent = "Resultados guardados. Ya se van a ver en el tablero.";
      } catch (error) {
        estadoGuardar.className = "estado err";
        estadoGuardar.textContent = "Error al guardar: " + error.message;
      } finally {
        btnGuardar.disabled = false;
      }
    });

    (() => {
      const hoy = new Date();
      const yyyy = hoy.getFullYear();
      const mm = String(hoy.getMonth() + 1).padStart(2, "0");
      const dd = String(hoy.getDate()).padStart(2, "0");
      document.getElementById("fecha").value = `${yyyy}-${mm}-${dd}`;
    })();

    // --- Próximo sorteo manual (feriados) ---

    const CLAVE_PROXIMO_SORTEO = "proximo_sorteo_lotoplus";
    const inputProximo = document.getElementById("proximoSorteoManual");
    const estadoProximo = document.getElementById("estadoProximo");

    async function cargarProximoSorteoManual() {
      try {
        const baseUrl = SUPABASE_URL.replace(/\/$/, "");
        const params = new URLSearchParams({ select: "valor", clave: `eq.${CLAVE_PROXIMO_SORTEO}` });
        const res = await fetch(`${baseUrl}/rest/v1/config_tablero?${params.toString()}`, {
          headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
        });
        if (!res.ok) return;
        const filas = await res.json();
        if (filas[0]?.valor) inputProximo.value = filas[0].valor;
      } catch (error) {
        console.warn("No se pudo cargar el próximo sorteo manual", error);
      }
    }

    async function guardarProximoSorteoManual(valor) {
      const baseUrl = SUPABASE_URL.replace(/\/$/, "");
      const res = await fetch(`${baseUrl}/rest/v1/config_tablero?on_conflict=clave`, {
        method: "POST",
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          "Content-Type": "application/json",
          "Prefer": "resolution=merge-duplicates,return=minimal"
        },
        body: JSON.stringify([{ clave: CLAVE_PROXIMO_SORTEO, valor, actualizado_en: new Date().toISOString() }])
      });
      if (!res.ok) throw new Error(await res.text());
    }

    document.getElementById("btn-guardar-proximo").addEventListener("click", async () => {
      if (!inputProximo.value) {
        estadoProximo.className = "estado err";
        estadoProximo.textContent = "Elegí una fecha primero.";
        return;
      }
      estadoProximo.className = "estado cargando";
      estadoProximo.textContent = "Guardando...";
      try {
        await guardarProximoSorteoManual(inputProximo.value);
        estadoProximo.className = "estado ok";
        estadoProximo.textContent = "Fecha manual guardada. Se va a usar en el tablero.";
      } catch (error) {
        estadoProximo.className = "estado err";
        estadoProximo.textContent = "Error al guardar: " + error.message;
      }
    });

    document.getElementById("btn-borrar-proximo").addEventListener("click", async () => {
      estadoProximo.className = "estado cargando";
      estadoProximo.textContent = "Borrando...";
      try {
        await guardarProximoSorteoManual("");
        inputProximo.value = "";
        estadoProximo.className = "estado ok";
        estadoProximo.textContent = "Fecha manual borrada. El tablero vuelve a calcularla solo.";
      } catch (error) {
        estadoProximo.className = "estado err";
        estadoProximo.textContent = "Error al borrar: " + error.message;
      }
    });

    cargarProximoSorteoManual();
  </script>
</body>
</html>
