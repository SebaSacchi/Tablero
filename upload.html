<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Subir Publicidades</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a2e;
      color: #fff;
      min-height: 100dvh;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 1.4rem;
      margin-bottom: 20px;
      color: #ffe600;
    }
    h2.seccion {
      font-size: 1.1rem;
      color: #ffe600;
      margin: 24px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      text-align: center;
    }
    .card h3 {
      font-size: 0.9rem;
      margin-bottom: 10px;
      color: #ccc;
    }
    .preview {
      width: 100%;
      max-height: 200px;
      object-fit: contain;
      border-radius: 8px;
      display: none;
      margin-bottom: 10px;
      background: rgba(0,0,0,0.3);
    }
    .preview.visible { display: block; }
    input[type="file"] { display: none; }
    .btn-elegir {
      display: block;
      width: 100%;
      padding: 14px;
      background: #1a3a8a;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-elegir.selected { background: #06913c; }
    .btn-borrar {
      display: none;
      width: 100%;
      padding: 12px;
      background: #8a1a1a;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-borrar.visible { display: block; }
    #btn-subir {
      display: block;
      width: 100%;
      padding: 18px;
      background: #ffe600;
      color: #000;
      border: none;
      border-radius: 16px;
      font-size: 1.3rem;
      font-weight: 900;
      cursor: pointer;
      margin-top: 16px;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-subir:disabled { opacity: 0.35; }
    #estado {
      text-align: center;
      margin-top: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      min-height: 2em;
    }
    .ok { color: #4cff4c; }
    .err { color: #ff4c4c; }
    .subiendo { color: #ffe600; }
  </style>
</head>
<body>
  <h1>PUBLICIDADES DEL DIA</h1>

  <h2 class="seccion">PUBLICIDAD PANTALLA COMPLETA (tecla 0)</h2>
  <div id="seccion-pub"></div>

  <h2 class="seccion">PROMO LATERAL (panel derecho en sorteos)</h2>
  <div id="seccion-lat"></div>

  <button id="btn-subir" disabled>SUBIR IMAGENES</button>
  <div id="estado"></div>

  <script>
    const SUPABASE_URL = "https://ldjwkwfkiqqfypftdeqa.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_birytOVhIQ0AoBY6f0yT-g_HpV01OhE";

    const PUB_FILES = ["img1.jpg", "img2.jpg", "pub3.jpg", "pub4.jpg", "pub5.jpg", "pub6.jpg", "pub7.jpg", "pub8.jpg"];
    const LAT_FILES = ["img3.jpg", "lat2.jpg", "lat3.jpg", "lat4.jpg", "lat5.jpg", "lat6.jpg", "lat7.jpg", "lat8.jpg"];

    const btnSubir = document.getElementById("btn-subir");
    const estado = document.getElementById("estado");
    const inputs = [];

    function crearPixelTransparente() {
      const canvas = document.createElement("canvas");
      canvas.width = 1;
      canvas.height = 1;
      return new Promise(resolve => canvas.toBlob(resolve, "image/png"));
    }

    async function deleteFile(name) {
      const blob = await crearPixelTransparente();
      const res = await fetch(
        `${SUPABASE_URL}/storage/v1/object/media/${name}`,
        {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "apikey": SUPABASE_ANON_KEY,
            "Content-Type": "image/png",
            "x-upsert": "true"
          },
          body: blob
        }
      );
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt);
      }
    }

    function crearCards(contenedorId, archivos, prefijo) {
      const contenedor = document.getElementById(contenedorId);
      archivos.forEach((archivo, i) => {
        const idx = prefijo + i;
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h3>IMAGEN ${i + 1}</h3>
          <img class="preview" id="preview_${idx}">
          <button class="btn-elegir" id="btn_${idx}">ELEGIR IMAGEN</button>
          <button class="btn-borrar" id="del_${idx}">BORRAR IMAGEN</button>
          <input type="file" id="file_${idx}" accept="image/*">
        `;
        contenedor.appendChild(card);

        const fileInput = card.querySelector(`#file_${idx}`);
        const preview = card.querySelector(`#preview_${idx}`);
        const btn = card.querySelector(`#btn_${idx}`);
        const btnDel = card.querySelector(`#del_${idx}`);

        btn.addEventListener("click", () => fileInput.click());
        fileInput.addEventListener("change", () => {
          const f = fileInput.files[0];
          if (f) {
            preview.src = URL.createObjectURL(f);
            preview.classList.add("visible");
            btn.textContent = "CAMBIAR IMAGEN";
            btn.classList.add("selected");
            btnDel.classList.add("visible");
            checkReady();
          }
        });

        btnDel.addEventListener("click", async () => {
          if (!confirm("¿Borrar esta imagen?")) return;
          btnDel.textContent = "BORRANDO...";
          btnDel.disabled = true;
          try {
            await deleteFile(archivo);
            preview.src = "";
            preview.classList.remove("visible");
            btn.textContent = "ELEGIR IMAGEN";
            btn.classList.remove("selected");
            btnDel.classList.remove("visible");
            btnDel.textContent = "BORRAR IMAGEN";
            btnDel.disabled = false;
            fileInput.value = "";
            estado.className = "ok";
            estado.textContent = "Imagen borrada correctamente";
          } catch (err) {
            estado.className = "err";
            estado.textContent = "Error al borrar: " + err.message;
            btnDel.textContent = "BORRAR IMAGEN";
            btnDel.disabled = false;
          }
        });

        inputs.push({ fileInput, archivo, btnDel });
      });
    }

    crearCards("seccion-pub", PUB_FILES, "pub");
    crearCards("seccion-lat", LAT_FILES, "lat");

    function cargarExistentes() {
      const base = `${SUPABASE_URL}/storage/v1/object/public/media`;
      const cache = Date.now();
      inputs.forEach(({ archivo, btnDel }, i) => {
        const img = new Image();
        const preview = document.getElementById(`preview_${i < 8 ? "pub" : "lat"}${i < 8 ? i : i - 8}`);
        img.onload = () => {
          if (preview) {
            preview.src = `${base}/${archivo}?v=${cache}`;
            preview.classList.add("visible");
          }
          if (btnDel) btnDel.classList.add("visible");
        };
        img.src = `${base}/${archivo}?v=${cache}`;
      });
    }

    cargarExistentes();

    function checkReady() {
      btnSubir.disabled = !inputs.some(({ fileInput }) => fileInput.files[0]);
    }

    async function uploadFile(file, name) {
      const res = await fetch(
        `${SUPABASE_URL}/storage/v1/object/media/${name}`,
        {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "apikey": SUPABASE_ANON_KEY,
            "Content-Type": file.type,
            "x-upsert": "true"
          },
          body: file
        }
      );
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt);
      }
    }

    btnSubir.addEventListener("click", async () => {
      btnSubir.disabled = true;
      estado.className = "subiendo";
      estado.textContent = "Subiendo...";

      try {
        const uploads = [];
        for (const { fileInput, archivo } of inputs) {
          if (fileInput.files[0]) {
            uploads.push(uploadFile(fileInput.files[0], archivo));
          }
        }
        await Promise.all(uploads);
        estado.className = "ok";
        estado.textContent = "Imagenes actualizadas correctamente";
      } catch (err) {
        estado.className = "err";
        estado.textContent = "Error al subir: " + err.message;
        btnSubir.disabled = false;
      }
    });
  </script>
</body>
</html>
